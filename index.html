<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>卡特尔16PF人格测评</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --primary: #4A6CF7;
  --primary-dark: #3B5DE7;
  --bg: #f0f4f8;
  --card: #ffffff;
  --text: #2d3748;
  --text-light: #718096;
  --border: #e2e8f0;
  --danger: #e53e3e;
  --success: #38a169;
  --warning: #dd6b20;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 800px; margin: 0 auto; padding: 16px; }

/* Header */
.header { text-align: center; padding: 24px 0 16px; }
.header h1 { font-size: 1.6rem; color: var(--primary); }
.header p { font-size: 0.85rem; color: var(--text-light); margin-top: 4px; }

/* Cards */
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px; }
.card h2 { font-size: 1.2rem; margin-bottom: 12px; color: var(--primary); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.95rem; }
.form-group input, .form-group select {
  width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 1rem; transition: border-color 0.2s; background: #fff;
}
.form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); }
.btn {
  display: inline-block; padding: 12px 28px; border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  text-align: center; user-select: none; -webkit-tap-highlight-color: transparent;
}
.btn-primary { background: var(--primary); color: #fff; width: 100%; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary { background: #e2e8f0; color: var(--text); }
.btn-secondary:hover { background: #cbd5e0; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #c53030; }
.btn-small { padding: 6px 14px; font-size: 0.85rem; }

/* Progress */
.progress-bar-wrap { background: #e2e8f0; border-radius: 20px; height: 10px; margin: 8px 0 16px; overflow: hidden; }
.progress-bar-fill { background: var(--primary); height: 100%; border-radius: 20px; transition: width 0.3s ease; }
.progress-text { text-align: center; font-size: 0.9rem; color: var(--text-light); margin-bottom: 4px; }

/* Question */
.question-num { font-size: 0.85rem; color: var(--text-light); margin-bottom: 8px; }
.question-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 20px; line-height: 1.7; }
.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex; align-items: flex-start; gap: 10px; padding: 14px 16px;
  border: 2px solid var(--border); border-radius: 10px; background: #fff;
  cursor: pointer; transition: all 0.15s; font-size: 1rem; text-align: left;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.option-btn:hover { border-color: var(--primary); background: #f7faff; }
.option-btn.selected { border-color: var(--primary); background: #eef2ff; font-weight: 500; }
.option-letter { font-weight: 700; color: var(--primary); min-width: 24px; font-size: 1.1rem; }
.option-text { flex: 1; }
.nav-buttons { display: flex; gap: 10px; margin-top: 20px; justify-content: space-between; }
.nav-buttons .btn { flex: 1; }
.keyboard-hint { text-align: center; font-size: 0.8rem; color: var(--text-light); margin-top: 10px; }

/* Results */
.result-header { text-align: center; padding: 20px 0; }
.result-header h2 { color: var(--primary); }
.chart-container { max-width: 500px; margin: 0 auto 20px; position: relative; }
.chart-container canvas { width: 100% !important; height: auto !important; max-height: 400px; }

.factor-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 12px 0; }
.factor-table th, .factor-table td { padding: 8px 6px; border: 1px solid var(--border); text-align: center; }
.factor-table th { background: #f7faff; font-weight: 600; position: sticky; top: 0; }
.factor-table .low { color: var(--danger); font-weight: 600; }
.factor-table .high { color: var(--primary); font-weight: 600; }
.factor-table .tag-low { background: #fff5f5; color: var(--danger); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
.factor-table .tag-high { background: #eef2ff; color: var(--primary); padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

.factor-detail { margin-bottom: 16px; padding: 14px; background: #fafbfc; border-radius: 8px; border-left: 4px solid var(--primary); }
.factor-detail h4 { font-size: 1rem; margin-bottom: 6px; }
.factor-detail .score-badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-weight: 700; font-size: 0.85rem; margin-left: 6px; }
.factor-detail .score-badge.low { background: #fff5f5; color: var(--danger); }
.factor-detail .score-badge.mid { background: #edf2f7; color: var(--text); }
.factor-detail .score-badge.high { background: #eef2ff; color: var(--primary); }
.factor-detail p { font-size: 0.9rem; color: #4a5568; margin-top: 4px; }

.xy-section { margin-top: 16px; }
.xy-card { padding: 12px 16px; background: #fafbfc; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--warning); }
.xy-card h4 { font-size: 0.95rem; margin-bottom: 4px; }
.xy-card .xy-score { font-weight: 700; color: var(--warning); }
.xy-card p { font-size: 0.85rem; color: #4a5568; }

.export-buttons { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
.export-buttons .btn { flex: 1; min-width: 120px; }
.reset-section { text-align: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* Print */
@media print {
  body { background: #fff; }
  .no-print, .btn, .nav-buttons, .reset-section, .keyboard-hint, .progress-bar-wrap, .progress-text { display: none !important; }
  .card { box-shadow: none; border: 1px solid #ddd; page-break-inside: avoid; }
  .container { max-width: 100%; }
  .chart-container { max-width: 400px; }
}

/* Hidden */
.hidden { display: none !important; }

/* Responsive */
@media (max-width: 600px) {
  .container { padding: 8px; }
  .card { padding: 16px; }
  .header h1 { font-size: 1.3rem; }
  .question-text { font-size: 1rem; }
  .option-btn { padding: 12px 12px; font-size: 0.95rem; }
  .factor-table { font-size: 0.75rem; }
  .factor-table th, .factor-table td { padding: 4px 3px; }
}
</style>
</head>

// Factor order for display
const FACTOR_ORDER = ['A','B','C','E','F','G','H','I','L','M','N','O','Q1','Q2','Q3','Q4'];

// ==================== SCORING ====================

function calculateRawScores(answers) {
  const raw = {};
  FACTOR_ORDER.forEach(f => { raw[f] = 0; });

  QUESTIONS.forEach(q => {
    if (!q.list || q.f === 'W') return;
    const answer = answers[q.id];
    if (!answer) return;

    const factor = q.f;
    const list = q.list;

    if (list === 'A') {
      if (answer === 'A') raw[factor] += 2;
      else if (answer === 'B') raw[factor] += 1;
    } else if (list === 'C') {
      if (answer === 'C') raw[factor] += 2;
      else if (answer === 'B') raw[factor] += 1;
    } else if (list === 'B') {
      if (answer === 'B') raw[factor] += 1;
    } else if (list === 'C1') {
      if (answer === 'C') raw[factor] += 1;
    } else if (list === 'A1') {
      if (answer === 'A') raw[factor] += 1;
    }
  });
  return raw;
}

function rawToSten(rawScore, factor, gender) {
  const norms = NORMS[factor][gender === '男' ? 'M' : 'F'];
  for (let i = 0; i < 10; i++) {
    const r = norms[i * 2];
    const l = norms[i * 2 + 1];
    if (rawScore >= r && rawScore <= l) {
      return i + 1;
    }
  }
  return null; // Should not happen
}

function calculateAll(answers, gender) {
  const raw = calculateRawScores(answers);
  const sten = {};
  FACTOR_ORDER.forEach(f => {
    sten[f] = rawToSten(raw[f], f, gender);
  });

  // X factors
  const x1 = (38 + 2*sten['L'] + 3*sten['O'] + 4*sten['Q4'] - 2*sten['G'] - 2*sten['H'] - 2*sten['Q2']) / 10;
  const x2 = (2*sten['A'] + 3*sten['E'] + 4*sten['F'] + 5*sten['H'] - 2*sten['Q2'] - 11) / 10;
  const x3 = (77 + 2*sten['C'] + 2*sten['E'] + 2*sten['F'] + 2*sten['N'] - 4*sten['A'] - 6*sten['I'] - 2*sten['M']) / 10;
  const x4 = (4*sten['E'] + 3*sten['M'] + 4*sten['Q1'] + 4*sten['Q2'] - 3*sten['A'] - 2*sten['G']) / 10;

  // Y factors
  const y1 = sten['C'] + sten['F'] + (11 - sten['O']) + (11 - sten['Q4']);
  const y2 = sten['Q3']*2 + sten['G']*2 + sten['C']*2 + sten['E'] + sten['N'] + sten['Q2'] + sten['Q1'];
  const y3 = (11 - sten['A'])*2 + sten['B']*2 + sten['E'] + (11 - sten['F'])*2 + sten['H'] + sten['I']*2 + sten['M'] + (11 - sten['N']) + sten['Q1'] + sten['Q2']*2;
  const y4 = sten['B'] + sten['G'] + sten['Q3'] + (11 - sten['F']);

  return {
    raw, sten,
    x: { X1: +x1.toFixed(1), X2: +x2.toFixed(1), X3: +x3.toFixed(1), X4: +x4.toFixed(1) },
    y: { Y1: y1, Y2: y2, Y3: y3, Y4: y4 }
  };
}

// ==================== STATE ====================

const STORAGE_KEY = '16pf_data';

function loadState() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (data) return JSON.parse(data);
  } catch(e) {}
  return null;
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function clearState() {
  localStorage.removeItem(STORAGE_KEY);
}

// ==================== RENDER ====================

let currentState = null;
let currentQuestion = 0;
let chartInstance = null;

function getState() {
  const saved = loadState();
  if (saved) return saved;
  return { phase: 'info', name: '', gender: '', age: '', answers: {}, results: null };
}

      <p>Sixteen Personality Factor Questionnaire</p>

      </ul>
    </div>
    <div class="card">
      <h2>个人信息</h2>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="inputName" placeholder="请输入你的昵称" value="${escapeHtml(state.name)}">
      </div>
      <div class="form-group">
        <label>性别</label>
        <select id="inputGender">
          <option value="">请选择</option>
          <option value="男" ${state.gender==='男'?'selected':''}>男</option>
          <option value="女" ${state.gender==='女'?'selected':''}>女</option>
        </select>
      </div>
      <div class="form-group">
        <label>年龄</label>
        <input type="number" id="inputAge" placeholder="请输入你的年龄" value="${state.age||''}" min="10" max="99">
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">开始测评</button>
      ${state.answers && Object.keys(state.answers).length > 0 ? `
        <div class="reset-section" style="margin-top:16px;">
          <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:8px;">检测到上次答题进度（已完成 ${Object.keys(state.answers).length}/187 题）</p>
          <button class="btn btn-secondary" onclick="resumeQuiz()" style="width:100%;margin-bottom:8px;">继续答题</button>
          <button class="btn btn-danger btn-small" onclick="resetQuiz()">清除记录重新开始</button>
        </div>
      ` : ''}
    </div>
  `;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function startQuiz() {
  const name = document.getElementById('inputName').value.trim();
  const gender = document.getElementById('inputGender').value;
  const age = document.getElementById('inputAge').value.trim();

  if (!name) { alert('请输入昵称'); return; }
  if (!gender) { alert('请选择性别'); return; }
  if (!age || isNaN(age) || age < 10 || age > 99) { alert('请输入有效年龄（10-99）'); return; }

  currentState = { phase: 'quiz', name, gender, age, answers: {}, results: null };
  saveState(currentState);
  currentQuestion = findFirstUnanswered();
  renderQuiz();
}

function resumeQuiz() {
  currentState = loadState();
  if (!currentState) { renderInfo(); return; }
  currentState.phase = 'quiz';
  currentQuestion = findFirstUnanswered();
  renderQuiz();
}

function resetQuiz() {
  if (confirm('确定要清除所有答题记录重新开始吗？此操作不可恢复。')) {
    clearState();
    currentState = null;
    currentQuestion = 0;
    renderInfo();
  }
}

function findFirstUnanswered() {
  const state = getState();
  for (let i = 1; i <= 187; i++) {
    if (!state.answers[i]) return i;
  }
  return 187;
}

function getUnansweredList(state) {
  const list = [];
  for (let i = 1; i <= 187; i++) {
    if (!state.answers[i]) list.push(i);
  }
  return list;
}

function goToQuestion(num) {
  currentQuestion = Math.max(1, Math.min(187, num));
  renderQuiz();
  window.scrollTo(0, 0);
}

function selectAnswer(choice) {
  if (!currentState) currentState = loadState();
  currentState.answers[currentQuestion] = choice;
  saveState(currentState);

  // Auto-advance after selection
  if (currentQuestion < 187) {
    setTimeout(() => {
      currentQuestion++;
      renderQuiz();
      window.scrollTo(0, 0);
    }, 200);
  } else {
    renderQuiz();
    window.scrollTo(0, 0);
  }
}

function renderQuiz() {
  const state = loadState();
  if (!state) { renderInfo(); return; }
  currentState = state;

  const q = QUESTIONS[currentQuestion - 1];
  const answered = state.answers[currentQuestion] || null;
  const totalAnswered = Object.keys(state.answers).length;
  const progress = (totalAnswered / 187) * 100;

  let optionsHtml = '';
  ['A','B','C'].forEach(letter => {
    const text = q[letter.toLowerCase()];
    const sel = answered === letter ? ' selected' : '';
    optionsHtml += `
      <div class="option-btn${sel}" onclick="selectAnswer('${letter}')">
        <span class="option-letter">${letter}</span>
        <span class="option-text">${text}</span>
      </div>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>卡特尔16PF人格测评</h1>
      <p>${state.name} | ${state.gender} | ${state.age}岁</p>
      <div class="progress-text">第 ${currentQuestion} / 187 题（已答 ${totalAnswered} 题）</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:${progress}%"></div>
      </div>
    </div>
    <div class="card">
      <div class="question-num">第 ${currentQuestion} 题</div>
      <div class="question-text">${q.t}</div>
      <div class="options">${optionsHtml}</div>
      <div class="nav-buttons">
        <button class="btn btn-secondary" onclick="goToQuestion(${currentQuestion - 1})" ${currentQuestion === 1 ? 'disabled' : ''}>← 上一题</button>
        <button class="btn btn-secondary" onclick="goToQuestion(${currentQuestion + 1})" ${currentQuestion === 187 ? 'disabled' : ''}>下一题 →</button>
      </div>
      <div class="keyboard-hint">键盘快捷键：按 <strong>A / B / C</strong> 选择答案并自动跳转下一题</div>
    </div>

    <!-- Unanswered / Submit area -->
    <div class="card" style="margin-top:16px;">
      ${totalAnswered >= 187 ? `
        <p style="text-align:center;color:var(--success);font-weight:600;margin-bottom:12px;">全部 187 题已完成</p>
        <button class="btn btn-primary" onclick="finishQuiz()">提交答卷，查看结果</button>
      ` : `
        <p style="font-size:0.95rem;color:var(--warning);font-weight:600;">还有 <span style="font-size:1.2rem;">${187 - totalAnswered}</span> 题未作答</p>
        <div style="margin:8px 0;font-size:0.85rem;color:var(--text-light);">点击下方题号可一键跳转到漏答题目：</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;max-height:200px;overflow-y:auto;padding:4px 0;">
          ${getUnansweredList(state).map(n => `<span style="display:inline-block;padding:4px 10px;background:#fff5f5;border:1px solid #fed7d7;border-radius:6px;cursor:pointer;font-size:0.85rem;color:var(--danger);" onclick="goToQuestion(${n})">${n}</span>`).join('')}
        </div>
      `}
    </div>

    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-danger btn-small" onclick="resetQuiz()">清除记录重新开始</button>
    </div>
  `;
}

function finishQuiz() {
  const state = loadState();
  if (!state) return;

  // Check all answered
  const unanswered = [];
  for (let i = 1; i <= 187; i++) {
    if (!state.answers[i]) unanswered.push(i);
  }

  if (unanswered.length > 0) {
    alert(`还有 ${unanswered.length} 题未作答，请完成所有题目后再提交。`);
    currentQuestion = unanswered[0];
    renderQuiz();
    window.scrollTo(0, 0);
    return;
  }

  // Calculate results
  const results = calculateAll(state.answers, state.gender);
  state.results = results;
  state.phase = 'results';
  saveState(state);
  renderResults();
  window.scrollTo(0, 0);
}

function renderResults() {
  const state = loadState();
  if (!state || !state.results) { renderInfo(); return; }
  const r = state.results;

  // Build factor details HTML
  let factorDetailsHtml = '';
  FACTOR_ORDER.forEach(f => {
    const name = FACTOR_NAMES[f];
    const sten = r.sten[f];
    let badgeClass = 'mid';
    let label = '中等';
    let desc = '';
    if (sten <= 3) {
      badgeClass = 'low';
      label = '低分';
      desc = FEATURES[f].low;
    } else if (sten >= 8) {
      badgeClass = 'high';
      label = '高分';
      desc = FEATURES[f].high;
    } else {
      desc = FEATURES[f].low + '\n' + FEATURES[f].high;
    }
    factorDetailsHtml += `
      <div class="factor-detail">
        <h4>${f}（${name}）<span class="score-badge ${badgeClass}">标准分 ${sten} — ${label}</span></h4>
        <p>${desc.replace(/\n/g, '<br>')}</p>
      </div>`;
  });

  // Build XY HTML
  let xyHtml = '';
  ['X1','X2','X3','X4'].forEach(x => {
    xyHtml += `
      <div class="xy-card">
        <h4>${x}：${x==='X1'?'适应与焦虑性':x==='X2'?'内向与外向性':x==='X3'?'感情用事与安详机警性':'怯懦与果敢性'} <span class="xy-score">得分：${r.x[x]}</span></h4>
        <p>${X_FEATURES[x]}</p>
      </div>`;
  });
  ['Y1','Y2','Y3','Y4'].forEach(y => {
    xyHtml += `
      <div class="xy-card">
        <h4>${y}：${y==='Y1'?'心理健康者的人格因素':y==='Y2'?'从事专业而有成就者的人格因素':y==='Y3'?'创造力强的人格因素':'在新的环境中有成长能力者的人格因素'} <span class="xy-score">得分：${r.y[y]}</span></h4>
        <p>${Y_FEATURES[y]}</p>
      </div>`;
  });

  // Build table rows
  let tableRows = '';
  FACTOR_ORDER.forEach(f => {
    const sten = r.sten[f];
    let tag = '';
    if (sten <= 3) tag = '<span class="tag-low">低分</span>';
    else if (sten >= 8) tag = '<span class="tag-high">高分</span>';
    const clsLow = sten <= 3 ? ' low' : '';
    const clsHigh = sten >= 8 ? ' high' : '';
    // Build score bar visualization (1-10)
    let barCells = '';
    for (let i = 1; i <= 10; i++) {
      if (i === sten) barCells += `<td style="background:var(--primary);color:#fff;font-weight:700;">★</td>`;
      else barCells += `<td>${i}</td>`;
    }
    tableRows += `
      <tr>
        <td>${f}（${FACTOR_NAMES[f]}）</td>
        <td>${r.raw[f]}</td>
        <td class="${clsLow || clsHigh}">${sten} ${tag}</td>
        ${barCells}
      </tr>`;
  });

  document.getElementById('app').innerHTML = `
    <div class="header no-print">
      <h1>16PF 测评报告</h1>
      <p>${state.name} | ${state.gender} | ${state.age}岁</p>
    </div>

    <div class="result-header print-only" style="display:none;">
      <h2>卡特尔十六种人格因素测验报告</h2>
      <p>姓名：${state.name} | 性别：${state.gender} | 年龄：${state.age}岁</p>
    </div>

    <!-- Radar Chart -->
    <div class="card">
      <h2>16种人格因素雷达图</h2>
      <div class="chart-container">
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <!-- Score Table -->
    <div class="card">
      <h2>得分总览</h2>
      <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:10px;"><span class="tag-low">低分</span> ≤3分 | <span class="tag-high">高分</span> ≥8分</p>
      <div class="table-wrap">
        <table class="factor-table">
          <thead>
            <tr>
              <th>因素</th>
              <th>原始分</th>
              <th>标准分</th>
              <th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>

    <!-- Factor Details -->
    <div class="card">
      <h2>各因素详细解析</h2>
      ${factorDetailsHtml}
    </div>

    <!-- XY Factors -->
    <div class="card">
      <h2>次元人格因素和特殊应用公式</h2>
      <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:10px;">X类型：3分以下为低分特征，8分以上为高分特征</p>
      ${xyHtml}
    </div>

    <!-- Export -->
    <div class="card no-print">
      <h2>导出报告</h2>
      <div class="export-buttons">
        <button class="btn btn-primary" onclick="exportPDF()">导出 PDF（打印）</button>
        <button class="btn btn-secondary" onclick="exportWord()">导出 Word 文档</button>
      </div>
    </div>

    <!-- Reset -->
    <div class="reset-section no-print">
      <button class="btn btn-danger btn-small" onclick="resetQuiz()">清除记录重新测评</button>
    </div>
  `;

  // Draw chart
  setTimeout(drawRadarChart, 100);
}

function drawRadarChart() {
  const ctx = document.getElementById('radarChart');
  if (!ctx) return;
  if (chartInstance) chartInstance.destroy();

  const state = loadState();
  if (!state || !state.results) return;
  const r = state.results;

  const labels = FACTOR_ORDER.map(f => f + ' ' + FACTOR_NAMES[f]);
  const data = FACTOR_ORDER.map(f => r.sten[f]);

  chartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: labels,
      datasets: [{
        label: '标准分（1-10）',
        data: data,
        backgroundColor: 'rgba(74,108,247,0.2)',
        borderColor: 'rgba(74,108,247,1)',
        borderWidth: 2,
        pointBackgroundColor: data.map(v => v <= 3 ? '#e53e3e' : v >= 8 ? '#4A6CF7' : '#718096'),
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      scales: {
        r: {
          min: 1,
          max: 10,
          ticks: { stepSize: 1, display: true, backdropColor: 'transparent', font: { size: 10 } },
          pointLabels: { font: { size: 11 } }
        }
      },
      plugins: {
        legend: { display: false }
      }
    }
  });
}

function exportPDF() {
  // Add print-only header
  document.querySelector('.print-only').style.display = 'block';
  window.print();
  setTimeout(() => {
    const el = document.querySelector('.print-only');
    if (el) el.style.display = 'none';
  }, 500);
}

  // Build a simple HTML document that Word can open
  let html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">

table { border-collapse: collapse; width: 100%; margin: 10px 0; }
th, td { border: 1px solid #000; padding: 4px 8px; text-align: center; font-size: 10pt; }

</style></head><body>
<h2>卡特尔十六种人格因素测验报告</h2>

<h3>一、得分总览</h3>
<table><tr><th>因素</th><th>原始分</th><th>标准分</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th></tr>`;

// ==================== KEYBOARD ====================

document.addEventListener('keydown', function(e) {
  const state = loadState();
  if (!state || state.phase !== 'quiz') return;

  const key = e.key.toUpperCase();
  if (key === 'A' || key === 'B' || key === 'C') {
    e.preventDefault();
    selectAnswer(key);
  } else if (key === 'ARROWLEFT' || key === 'LEFT') {
    e.preventDefault();
    goToQuestion(currentQuestion - 1);
  } else if (key === 'ARROWRIGHT' || key === 'RIGHT') {
    e.preventDefault();
    goToQuestion(currentQuestion + 1);
  }
});

// ==================== INIT ====================

function init() {
  const state = loadState();
  if (!state || state.phase === 'info') {
    renderInfo();
  } else if (state.phase === 'quiz') {
    currentState = state;
    currentQuestion = findFirstUnanswered();
    renderQuiz();
  } else if (state.phase === 'results') {
    currentState = state;
    renderResults();
  } else {
    renderInfo();
  }
}

init();
